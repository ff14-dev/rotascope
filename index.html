<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>RotaScope Overlay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <section id="top-controls">
        <section id="log-picker">
          <button id="log-prev" type="button" class="log-nav-btn" aria-label="이전 로그">◀</button>
          <span id="log-index">1 / 1</span>
          <button id="log-next" type="button" class="log-nav-btn" aria-label="다음 로그">▶</button>
        </section>
        <button id="settings-toggle" type="button" title="설정">⚙</button>
      </section>

      <!-- 접힘/펼침 설정 패널 -->
      <div id="settings-panel" class="hidden">
        <div class="sp-row">
          <label>층 선택</label>
          <div id="encounter-buttons" class="enc-btn-group">
            <button type="button" class="enc-btn" data-encounter="m9s">1층</button>
            <button type="button" class="enc-btn" data-encounter="m10s">2층</button>
            <button type="button" class="enc-btn" data-encounter="m11s">3층</button>
            <button type="button" class="enc-btn" data-encounter="m12s-p1">4층 전반</button>
            <button type="button" class="enc-btn" data-encounter="m12s-p2">4층 후반</button>
          </div>
        </div>
        <div class="sp-row">
          <label>직업</label>
          <span id="detected-job" class="sp-val sp-job">--</span>
          <span class="sp-hint">ACT 자동</span>
        </div>
        <div class="sp-subtitle" id="player-label">대기 중...</div>
        <div class="sp-divider"></div>
        <div class="sp-row">
          <label>투명도%</label>
          <div class="sp-stepper">
            <button id="ctrl-opacity-dec" type="button" class="sp-step-btn" aria-label="투명도 감소">-</button>
            <span id="ctrl-opacity-val" class="sp-step-val">65%</span>
            <button id="ctrl-opacity-inc" type="button" class="sp-step-btn" aria-label="투명도 증가">+</button>
          </div>
        </div>
        <div class="sp-row">
          <label>X</label>
          <div class="sp-stepper">
            <button id="ctrl-node-w-dec" type="button" class="sp-step-btn" aria-label="X 감소">-</button>
            <span id="ctrl-node-w-val" class="sp-step-val">72</span>
            <button id="ctrl-node-w-inc" type="button" class="sp-step-btn" aria-label="X 증가">+</button>
          </div>
        </div>
        <div class="sp-row">
          <label>Y</label>
          <div class="sp-stepper">
            <button id="ctrl-node-h-dec" type="button" class="sp-step-btn" aria-label="Y 감소">-</button>
            <span id="ctrl-node-h-val" class="sp-step-val">48</span>
            <button id="ctrl-node-h-inc" type="button" class="sp-step-btn" aria-label="Y 증가">+</button>
          </div>
        </div>
      </div>

      <section id="timeline-container">
        <div id="timeline"></div>
      </section>
      <section id="skill-log-panel">
        <div id="skill-log"></div>
      </section>
      <section id="status-bar">
        <span id="status-text">타임라인 데이터를 불러오는 중입니다.</span>
      </section>

    </div>
    <script src="https://ngld.github.io/OverlayPlugin/assets/shared/common.min.js"></script>
    <script src="overlay.js"></script>
  </body>
</html>
