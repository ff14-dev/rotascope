<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>RotaScope Overlay</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">

      <!-- 설정 토글 버튼 (우상단 고정) -->
      <button id="settings-toggle" type="button" title="설정">⚙</button>

      <!-- 접힘/펼침 설정 패널 -->
      <div id="settings-panel" class="hidden">
        <div class="sp-row">
          <label>층 선택</label>
          <div id="encounter-buttons" class="enc-btn-group">
            <button type="button" class="enc-btn" data-encounter="m9s">1층</button>
            <button type="button" class="enc-btn" data-encounter="m10s">2층</button>
            <button type="button" class="enc-btn" data-encounter="m11s">3층</button>
            <button type="button" class="enc-btn" data-encounter="m12s-p1">4층 전반</button>
            <button type="button" class="enc-btn" data-encounter="m12s-p2">4층 후반</button>
          </div>
        </div>
        <div class="sp-row">
          <label>직업</label>
          <span id="detected-job" class="sp-val sp-job">--</span>
          <span class="sp-hint">ACT 자동</span>
        </div>
        <div class="sp-subtitle" id="player-label">대기 중...</div>
        <div class="sp-divider"></div>
        <div class="sp-row">
          <label for="ctrl-opacity-num">투명도%</label>
          <input id="ctrl-opacity-num" class="sp-input" type="number" min="10" max="100" step="5" />
          <span class="sp-hint">Enter</span>
        </div>
        <div class="sp-row">
          <label for="ctrl-node-w-num">X</label>
          <input id="ctrl-node-w-num" class="sp-input" type="number" min="52" max="140" step="4" />
          <span class="sp-hint">Enter</span>
        </div>
        <div class="sp-row">
          <label for="ctrl-node-h-num">Y</label>
          <input id="ctrl-node-h-num" class="sp-input" type="number" min="28" max="80" step="4" />
          <span class="sp-hint">Enter</span>
        </div>
      </div>

      <section id="status-bar">
        <span id="status-text">API에서 데이터를 불러오는 중입니다.</span>
      </section>
      <section id="timeline-container">
        <div id="timeline"></div>
      </section>
      <section id="skill-log-panel">
        <div id="skill-log"></div>
      </section>

    </div>
    <script src="https://ngld.github.io/OverlayPlugin/assets/shared/common.min.js"></script>
    <script src="overlay.js"></script>
  </body>
</html>
